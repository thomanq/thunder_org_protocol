<!DOCTYPE html>
<html>

<head>
  <title>Thunder Org Protocol Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px;
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      color: #444;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }

    label #protocol {
      margin-top: 8px;
    }

    input[type="text"] {
      width: calc(100% - 20px);
      padding: 0px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      padding-right: 20px;
      height: 34px;
    }

    #params {
      margin-bottom: 20px;
    }

    .param {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .param label {
      flex: 1;
      font-size: 14px;
    }

    .param select {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      text-align: left;
      max-width: 150px;
      height: 34px;
    }

    .param input[type="text"] {
      flex: 2;
      padding: 0px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin: 0px 6px;
      height: 34px;
    }

    .param button {
      margin-left: 10px;
      padding: 6px 12px;
      background-color: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      height: 34px;
    }

    .param button:hover {
      background-color: #c0392b;
    }

    button {
      display: inline-block;
      padding: 10px 20px;
      margin: 5px 0;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:active {
      background-color: #1c598a;
    }

    #save {
      background-color: #2ecc71;
    }

    #save:hover {
      background-color: #27ae60;
    }

    #save:active {
      background-color: #1e8449;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Thunder Org Protocol Options</h1>
    <label>
      Protocol:
      <input type="text" id="protocol" placeholder="capture">
    </label>
    <div id="params">
      <h2>Parameters</h2>
    </div>
    <button id="add-param">Add Parameter</button>
    <button id="save">Save</button>
  </div>

  <script type="module" src="options.js"></script>
</body>

</html>
